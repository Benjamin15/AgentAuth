name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[test]"

    - name: Lint with Ruff
      run: ruff check agentauth

    - name: Check formatting with Ruff
      run: ruff format --check agentauth

    - name: Type check with MyPy
      run: mypy agentauth

    - name: Run tests with Pytest
      run: pytest --cov=agentauth --cov-report=term-missing
